# cargo-deny configuration. Run locally with `cargo deny check`; also runs
# in CI (see .github/workflows/security.yml) on every push/PR.

[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
ignore = [
    # quick-xml's two 2026-06-29 DoS advisories (unbounded allocation while
    # parsing untrusted, attacker-controlled XML) reach KeyStash only via
    # wayland-scanner, a proc-macro that runs at *compile time* to generate
    # Wayland protocol bindings from XML files bundled with the wayland
    # crates themselves -- not something KeyStash parses at runtime, and
    # not attacker-reachable input either way. Revisit if wl-clipboard-rs
    # (arboard's Wayland backend) bumps past wayland-scanner 0.31.
    { id = "RUSTSEC-2026-0194", reason = "quick-xml is a wayland-scanner build-time-only dependency (proc-macro codegen from bundled protocol XML), not linked into the runtime binary or reachable via any external input" },
    { id = "RUSTSEC-2026-0195", reason = "same as RUSTSEC-2026-0194 -- build-time-only via wayland-scanner, not runtime-reachable" },
    # Transitive via ratatui 0.26's own dependency choice, not something
    # KeyStash can move independently of a ratatui upgrade. Tracked as a
    # future item, not blocking every CI run until then. (lru's separate
    # RUSTSEC-2026-0002 "unsound" advisory is also transitive via ratatui,
    # but cargo-deny doesn't hard-fail on the "unsound" category by default,
    # so it needs no explicit ignore entry here -- ratatui bumping fixes
    # both at once when it happens.)
    { id = "RUSTSEC-2024-0436", reason = "paste is unmaintained but has no known vulnerability; pulled in by ratatui 0.26, not fixable without a ratatui upgrade" },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "0BSD",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]
confidence-threshold = 0.8

[licenses.private]
ignore = false

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow-workspace = false

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
bitbucket = []
